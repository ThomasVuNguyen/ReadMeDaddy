  <text x="138" y="113" text-anchor="middle" fill="#FF6B6B" font-size="12" font-weight="bold">Part I</text>
  <text x="138" y="140" text-anchor="middle" fill="#e8e8e8" font-size="18" font-weight="bold">Origins</text>
  <line x1="80" y1="153" x2="195" y2="153" stroke="#FF6B6B" stroke-width="0.5" opacity="0.4"/>
  <text x="138" y="175" text-anchor="middle" fill="#8892b0" font-size="11">Ancient history</text>
  <text x="138" y="191" text-anchor="middle" fill="#8892b0" font-size="11">+ first chemo</text>
  <text x="138" y="258" text-anchor="middle" fill="#FF6B6B" font-size="10" opacity="0.6">1947</text>
