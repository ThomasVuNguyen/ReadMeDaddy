  <text x="962" y="175" text-anchor="middle" fill="#8892b0" font-size="11">Gleevec, Herceptin</text>
  <text x="962" y="191" text-anchor="middle" fill="#8892b0" font-size="11">+ precision drugs</text>
  <text x="962" y="258" text-anchor="middle" fill="#B388FF" font-size="10" opacity="0.6">2000s</text>
  <line x1="65" y1="310" x2="1035" y2="310" stroke="#FF80AB" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>
