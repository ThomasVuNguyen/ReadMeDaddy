  <text x="302" y="191" text-anchor="middle" fill="#8892b0" font-size="11">+ combo chemo</text>
  <text x="302" y="258" text-anchor="middle" fill="#FF9800" font-size="10" opacity="0.6">1950s-70s</text>
  <line x1="377" y1="178" x2="393" y2="178" stroke="#8892b0" stroke-width="1.5" opacity="0.5"/>
