  <text x="798" y="140" text-anchor="middle" fill="#e8e8e8" font-size="18" font-weight="bold">Molecular</text>
  <line x1="740" y1="153" x2="855" y2="153" stroke="#4FC3F7" stroke-width="0.5" opacity="0.4"/>
  <text x="798" y="175" text-anchor="middle" fill="#8892b0" font-size="11">Oncogenes</text>
  <text x="798" y="191" text-anchor="middle" fill="#8892b0" font-size="11">+ tumor suppressors</text>
  <text x="798" y="258" text-anchor="middle" fill="#4FC3F7" font-size="10" opacity="0.6">1970s-2000</text>
  <line x1="872" y1="178" x2="888" y2="178" stroke="#8892b0" stroke-width="1.5" opacity="0.5"/>
  <polygon points="888,174 894,178 888,182" fill="#8892b0" opacity="0.5"/>
  <rect x="890" y="85" width="145" height="185" rx="10" fill="#131833" stroke="#B388FF" stroke-width="2" opacity="0.9"/>
