  <line x1="302" y1="270" x2="302" y2="310" stroke="#FF80AB" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <line x1="468" y1="270" x2="468" y2="310" stroke="#FF80AB" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <line x1="632" y1="270" x2="632" y2="310" stroke="#FF80AB" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <line x1="798" y1="270" x2="798" y2="310" stroke="#FF80AB" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <line x1="962" y1="270" x2="962" y2="310" stroke="#FF80AB" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="55" y="315" text-anchor="end" fill="#FF80AB" font-size="12" font-weight="bold">Carla Reed</text>
  <text x="55" y="330" text-anchor="end" fill="#8892b0" font-size="10">present-day patient thread</text>
