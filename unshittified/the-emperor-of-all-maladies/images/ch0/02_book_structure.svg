  <circle cx="302" cy="310" r="4" fill="#FF80AB" opacity="0.8"/>
  <circle cx="468" cy="310" r="4" fill="#FF80AB" opacity="0.8"/>
  <circle cx="632" cy="310" r="4" fill="#FF80AB" opacity="0.8"/>
  <circle cx="798" cy="310" r="4" fill="#FF80AB" opacity="0.8"/>
  <circle cx="962" cy="310" r="4" fill="#FF80AB" opacity="0.8"/>
