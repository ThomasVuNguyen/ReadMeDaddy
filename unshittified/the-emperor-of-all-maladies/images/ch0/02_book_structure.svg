<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 450" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#131833"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1100" height="450" fill="url(#bgGrad2)"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="bold">Book Structure: Six Fronts of the Cancer War</text>
  <text x="550" y="58" text-anchor="middle" fill="#8892b0" font-size="13">Each part opens a new front while earlier battles continue</text>
  <rect x="65" y="85" width="145" height="185" rx="10" fill="#131833" stroke="#FF6B6B" stroke-width="2" opacity="0.9"/>
