<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#131833"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B6B" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#FF9800" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#69F0AE" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="520" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="bold">4,000 Years of Cancer</text>
  <text x="600" y="62" text-anchor="middle" fill="#8892b0" font-size="13">From humoral theory to targeted therapy</text>

  <!-- Era backgrounds -->
  <rect x="80" y="80" width="254.39999999999998" height="16" rx="3" fill="#FF6B6B" opacity="0.08"/>
  <rect x="334.4" y="80" width="212.0" height="16" rx="3" fill="#FF9800" opacity="0.08"/>
  <rect x="546.4" y="80" width="254.39999999999998" height="16" rx="3" fill="#4FC3F7" opacity="0.08"/>
  <rect x="800.8000000000001" y="80" width="339.2" height="16" rx="3" fill="#B388FF" opacity="0.08"/>

  <!-- Era labels -->
  <text x="207.2" y="92" text-anchor="middle" fill="#FF6B6B" font-size="10" opacity="0.8">ANCIENT ERA</text>
  <text x="440.40000000000003" y="92" text-anchor="middle" fill="#FF9800" font-size="10" opacity="0.8">SURGERY + RADIATION</text>
  <text x="673.6" y="92" text-anchor="middle" fill="#4FC3F7" font-size="10" opacity="0.8">CHEMOTHERAPY</text>
  <text x="970.4" y="92" text-anchor="middle" fill="#B388FF" font-size="10" opacity="0.8">MOLECULAR ERA</text>

  <!-- Era divider lines -->
  <line x1="334.4" y1="100" x2="334.4" y2="280" stroke="#8892b0" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.2"/>
  <line x1="546.4" y1="100" x2="546.4" y2="280" stroke="#8892b0" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.2"/>
  <line x1="800.8000000000001" y1="100" x2="800.8000000000001" y2="280" stroke="#8892b0" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.2"/>

  <!-- Main timeline line -->
  <line x1="70" y1="280" x2="1150" y2="280" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="112" cy="280" r="5" fill="#8892b0" filter="url(#glow)"/>
  <line x1="112" y1="280" x2="112" y2="212" stroke="#8892b0" stroke-width="1.5" opacity="0.5"/>
  <text x="112" y="206" text-anchor="middle" fill="#8892b0" font-size="11" font-weight="bold">~2500 BC</text>
  <text x="112" y="180" text-anchor="middle" fill="#8892b0" font-size="10">Imhotep describes</text>
  <text x="112" y="193" text-anchor="middle" fill="#8892b0" font-size="10">breast tumors</text>
  <circle cx="197" cy="280" r="5" fill="#FF6B6B" filter="url(#glow)"/>
  <line x1="197" y1="280" x2="197" y2="348" stroke="#FF6B6B" stroke-width="1.5" opacity="0.5"/>
  <text x="197" y="364" text-anchor="middle" fill="#FF6B6B" font-size="11" font-weight="bold">~400 BC</text>
  <text x="197" y="377" text-anchor="middle" fill="#8892b0" font-size="10">Hippocrates names</text>
  <text x="197" y="390" text-anchor="middle" fill="#8892b0" font-size="10">it 'karkinos'</text>
  <circle cx="281" cy="280" r="5" fill="#FF6B6B" filter="url(#glow)"/>
  <line x1="281" y1="280" x2="281" y2="212" stroke="#FF6B6B" stroke-width="1.5" opacity="0.5"/>
  <text x="281" y="206" text-anchor="middle" fill="#FF6B6B" font-size="11" font-weight="bold">~168 AD</text>
  <text x="281" y="180" text-anchor="middle" fill="#8892b0" font-size="10">Galen: cancer =</text>
  <text x="281" y="193" text-anchor="middle" fill="#8892b0" font-size="10">black bile excess</text>
  <circle cx="398" cy="280" r="5" fill="#FF9800" filter="url(#glow)"/>
  <line x1="398" y1="280" x2="398" y2="348" stroke="#FF9800" stroke-width="1.5" opacity="0.5"/>
  <text x="398" y="364" text-anchor="middle" fill="#FF9800" font-size="11" font-weight="bold">1846</text>
  <text x="398" y="377" text-anchor="middle" fill="#8892b0" font-size="10">Anesthesia enables</text>
  <text x="398" y="390" text-anchor="middle" fill="#8892b0" font-size="10">radical surgery</text>
  <circle cx="493" cy="280" r="5" fill="#FFEB3B" filter="url(#glow)"/>
  <line x1="493" y1="280" x2="493" y2="212" stroke="#FFEB3B" stroke-width="1.5" opacity="0.5"/>
  <text x="493" y="206" text-anchor="middle" fill="#FFEB3B" font-size="11" font-weight="bold">1895</text>
  <text x="493" y="180" text-anchor="middle" fill="#8892b0" font-size="10">X-rays discovered:</text>
  <text x="493" y="193" text-anchor="middle" fill="#8892b0" font-size="10">radiation therapy</text>
  <circle cx="589" cy="280" r="5" fill="#4FC3F7" filter="url(#glow)"/>
  <line x1="589" y1="280" x2="589" y2="348" stroke="#4FC3F7" stroke-width="1.5" opacity="0.5"/>
  <text x="589" y="364" text-anchor="middle" fill="#4FC3F7" font-size="11" font-weight="bold">1943</text>
  <text x="589" y="377" text-anchor="middle" fill="#8892b0" font-size="10">Mustard gas leads</text>
  <text x="589" y="390" text-anchor="middle" fill="#8892b0" font-size="10">to chemotherapy</text>
  <circle cx="674" cy="280" r="5" fill="#69F0AE" filter="url(#glow)"/>
  <line x1="674" y1="280" x2="674" y2="212" stroke="#69F0AE" stroke-width="1.5" opacity="0.5"/>
  <text x="674" y="206" text-anchor="middle" fill="#69F0AE" font-size="11" font-weight="bold">1947</text>
  <text x="674" y="180" text-anchor="middle" fill="#8892b0" font-size="10">Farber's antifolates:</text>
  <text x="674" y="193" text-anchor="middle" fill="#8892b0" font-size="10">first chemo remissions</text>
  <circle cx="769" cy="280" r="5" fill="#B388FF" filter="url(#glow)"/>
  <line x1="769" y1="280" x2="769" y2="348" stroke="#B388FF" stroke-width="1.5" opacity="0.5"/>
  <text x="769" y="364" text-anchor="middle" fill="#B388FF" font-size="11" font-weight="bold">1971</text>
  <text x="769" y="377" text-anchor="middle" fill="#8892b0" font-size="10">Nixon signs the</text>
  <text x="769" y="390" text-anchor="middle" fill="#8892b0" font-size="10">National Cancer Act</text>
  <circle cx="854" cy="280" r="5" fill="#FF9800" filter="url(#glow)"/>
  <line x1="854" y1="280" x2="854" y2="212" stroke="#FF9800" stroke-width="1.5" opacity="0.5"/>
  <text x="854" y="206" text-anchor="middle" fill="#FF9800" font-size="11" font-weight="bold">1975</text>
  <text x="854" y="180" text-anchor="middle" fill="#8892b0" font-size="10">Smoking-cancer link</text>
  <text x="854" y="193" text-anchor="middle" fill="#8892b0" font-size="10">drives prevention</text>
  <circle cx="939" cy="280" r="5" fill="#FF80AB" filter="url(#glow)"/>
  <line x1="939" y1="280" x2="939" y2="348" stroke="#FF80AB" stroke-width="1.5" opacity="0.5"/>
  <text x="939" y="364" text-anchor="middle" fill="#FF80AB" font-size="11" font-weight="bold">1986</text>
  <text x="939" y="377" text-anchor="middle" fill="#8892b0" font-size="10">Oncogenes found:</text>
  <text x="939" y="390" text-anchor="middle" fill="#8892b0" font-size="10">cancer = broken genes</text>
  <circle cx="1023" cy="280" r="5" fill="#69F0AE" filter="url(#glow)"/>
  <line x1="1023" y1="280" x2="1023" y2="212" stroke="#69F0AE" stroke-width="1.5" opacity="0.5"/>
  <text x="1023" y="206" text-anchor="middle" fill="#69F0AE" font-size="11" font-weight="bold">2000</text>
  <text x="1023" y="180" text-anchor="middle" fill="#8892b0" font-size="10">Six Hallmarks</text>
  <text x="1023" y="193" text-anchor="middle" fill="#8892b0" font-size="10">of Cancer defined</text>
  <circle cx="1098" cy="280" r="5" fill="#FFD700" filter="url(#glow)"/>
  <line x1="1098" y1="280" x2="1098" y2="348" stroke="#FFD700" stroke-width="1.5" opacity="0.5"/>
  <text x="1098" y="364" text-anchor="middle" fill="#FFD700" font-size="11" font-weight="bold">2001</text>
  <text x="1098" y="377" text-anchor="middle" fill="#8892b0" font-size="10">Gleevec: first</text>
  <text x="1098" y="390" text-anchor="middle" fill="#8892b0" font-size="10">targeted therapy</text>
  <polygon points="1150,274 1162,280 1150,286" fill="#FFD700" opacity="0.8"/>
  <text x="600" y="490" text-anchor="middle" fill="#8892b0" font-size="11" font-style="italic">"Cancer is not one disease but many. And each has its own biography." </text>
</svg>