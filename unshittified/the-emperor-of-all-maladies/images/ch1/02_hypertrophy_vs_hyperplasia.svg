  <rect width="800" height="420" fill="url(#bgGrad)" rx="12"/>
  <text x="400.0" y="40" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700">Two Types of Growth</text>
  <text x="400.0" y="62" text-anchor="middle" fill="#8a8fa8" font-size="14">How tissues get bigger (Virchow's framework)</text>
  <rect x="30" y="90" width="220" height="260" fill="#111738" rx="10" stroke="#69F0AE" stroke-width="1.5" stroke-opacity="0.4"/>
