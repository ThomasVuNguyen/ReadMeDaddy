  <text x="590.0" y="340" text-anchor="middle" fill="#69F0AE" font-size="14" font-weight="600">Count = 18 blast cells</text>
  <text x="590.0" y="395" text-anchor="middle" fill="#8a8fa8" font-size="12">Draw blood. Look under microscope.</text>
  <text x="590.0" y="415" text-anchor="middle" fill="#69F0AE" font-size="13" font-weight="600">Can see it. Can count it. Can test drugs.</text>
  <rect x="100" y="450" width="600" height="50" fill="#111738" rx="8" stroke="#FFEB3B" stroke-width="1" stroke-opacity="0.4"/>
  <text x="400.0" y="472" text-anchor="middle" fill="#FFEB3B" font-size="14" font-weight="600">"Science begins with counting."</text>
  <text x="400.0" y="490" text-anchor="middle" fill="#8a8fa8" font-size="12">Give a drug → draw blood → count cells → measure success or failure</text>
