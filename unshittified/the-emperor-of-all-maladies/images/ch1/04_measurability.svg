  <circle cx="190.0" cy="240" r="25" fill="#FF6B6B" opacity="0.3"/>
  <text x="190.0" y="244" text-anchor="middle" fill="#FF6B6B" font-size="10" opacity="0.7">tumor</text>
  <text x="250.0" y="210" text-anchor="middle" fill="#8a8fa8" font-size="20" opacity="0.4">?</text>
  <text x="150.0" y="290" text-anchor="middle" fill="#8a8fa8" font-size="20" opacity="0.4">?</text>
  <text x="260.0" y="280" text-anchor="middle" fill="#8a8fa8" font-size="20" opacity="0.4">?</text>
  <text x="210.0" y="395" text-anchor="middle" fill="#8a8fa8" font-size="12">No CT scans. No MRIs.</text>
  <text x="210.0" y="415" text-anchor="middle" fill="#FF6B6B" font-size="13" font-weight="600">Can't see it. Can't measure it.</text>
