  <rect width="800" height="520" fill="url(#bgGrad)" rx="12"/>
  <text x="400.0" y="40" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700">Why Leukemia? Because You Can Count It.</text>
  <text x="400.0" y="62" text-anchor="middle" fill="#8a8fa8" font-size="14">Farber's key insight: choose the cancer you can measure</text>
  <rect x="40" y="90" width="340" height="340" fill="#111738" rx="10" stroke="#FF6B6B" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="210.0" y="120" text-anchor="middle" fill="#FF6B6B" font-size="16" font-weight="600">Solid Tumor (1940s)</text>
