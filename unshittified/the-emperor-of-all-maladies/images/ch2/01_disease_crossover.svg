<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <title>The Great Crossover: Diseases Falling, Cancer Rising</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
    </style>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1e3a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="440" fill="url(#bgGrad)" rx="12"/>
  <text x="400.0" y="35" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700">The Great Crossover</text>
  <text x="400.0" y="57" text-anchor="middle" fill="#8a8fa8" font-size="14">As infectious diseases vanished, cancer filled the space they left</text>
  <rect x="90" y="75" width="640" height="315" fill="#111738" rx="8" opacity="0.5"/>
  <line x1="100" y1="380" x2="720" y2="380" stroke="#8a8fa8" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="80" x2="100" y2="380" stroke="#8a8fa8" stroke-width="1" opacity="0.5"/>
  <text x="55" y="230.0" text-anchor="middle" fill="#8a8fa8" font-size="11" transform="rotate(-90, 55, 230.0)">Deaths per 100,000</text>
  <text x="100" y="400" text-anchor="middle" fill="#8a8fa8" font-size="11">1900</text>
  <line x1="100" y1="380" x2="100" y2="385" stroke="#8a8fa8" stroke-width="1" opacity="0.3"/>
  <text x="224" y="400" text-anchor="middle" fill="#8a8fa8" font-size="11">1910</text>
  <line x1="224" y1="380" x2="224" y2="385" stroke="#8a8fa8" stroke-width="1" opacity="0.3"/>
  <text x="348" y="400" text-anchor="middle" fill="#8a8fa8" font-size="11">1920</text>
  <line x1="348" y1="380" x2="348" y2="385" stroke="#8a8fa8" stroke-width="1" opacity="0.3"/>
  <text x="472" y="400" text-anchor="middle" fill="#8a8fa8" font-size="11">1930</text>
  <line x1="472" y1="380" x2="472" y2="385" stroke="#8a8fa8" stroke-width="1" opacity="0.3"/>
  <text x="596" y="400" text-anchor="middle" fill="#8a8fa8" font-size="11">1940</text>
  <line x1="596" y1="380" x2="596" y2="385" stroke="#8a8fa8" stroke-width="1" opacity="0.3"/>
  <text x="720" y="400" text-anchor="middle" fill="#8a8fa8" font-size="11">1950</text>
  <line x1="720" y1="380" x2="720" y2="385" stroke="#8a8fa8" stroke-width="1" opacity="0.3"/>
  <path d="M100.0,107.3 L162.0,127.7 L224.0,161.8 L286.0,182.3 L348.0,216.4 L410.0,243.6 L472.0,277.7 L534.0,305.0 L596.0,325.5 L658.0,339.1 L720.0,352.7" fill="none" stroke="#4FC3F7" stroke-width="2.5" opacity="0.8"/>
  <circle cx="720.0" cy="352.7" r="4" fill="#4FC3F7" opacity="0.9"/>
  <text x="728.0" y="356.7" fill="#4FC3F7" font-size="12" font-weight="600">Tuberculosis</text>
  <path d="M100.0,202.7 L162.0,257.3 L224.0,298.2 L286.0,332.3 L348.0,352.7 L410.0,363.6 L472.0,369.1 L534.0,373.2 L596.0,375.9 L658.0,377.3 L720.0,378.6" fill="none" stroke="#B388FF" stroke-width="2.5" opacity="0.8"/>
  <circle cx="720.0" cy="378.6" r="4" fill="#B388FF" opacity="0.9"/>
  <text x="728.0" y="382.6" fill="#B388FF" font-size="12" font-weight="600">Typhoid</text>
  <path d="M100.0,291.4 L162.0,277.7 L224.0,264.1 L286.0,250.5 L348.0,236.8 L410.0,223.2 L422.4,216.4 L472.0,202.7 L534.0,189.1 L596.0,175.5 L658.0,161.8 L720.0,148.2" fill="none" stroke="#FF6B6B" stroke-width="2.5" opacity="0.8"/>
  <circle cx="720.0" cy="148.2" r="4" fill="#FF6B6B" opacity="0.9"/>
  <text x="728.0" y="152.2" fill="#FF6B6B" font-size="12" font-weight="600">Cancer</text>
  <circle cx="422.4" cy="216.4" r="12" fill="none" stroke="#FFEB3B" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="422.4" y="198.4" text-anchor="middle" fill="#FFEB3B" font-size="11" font-weight="600">1926: Cancer becomes #2 killer</text>
  <text x="400.0" y="425" text-anchor="middle" fill="#8a8fa8" font-size="12">Life expectancy: 47 → 68 years in half a century. Cancer was the price of living long enough to get it.</text>
</svg>
