<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <title>Cancer Treatment in the 1940s: Two Options</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
    </style>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1e3a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="350" fill="url(#bgGrad)" rx="12"/>
  <text x="400.0" y="35" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700">Cancer Treatment in the 1940s</text>
  <text x="400.0" y="57" text-anchor="middle" fill="#8a8fa8" font-size="14">"A choice between the hot ray and the cold knife"</text>
  <rect x="60" y="80" width="300" height="210" fill="#111738" rx="10" stroke="#4FC3F7" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="210.0" y="110" text-anchor="middle" fill="#4FC3F7" font-size="16" font-weight="600">The Cold Knife</text>
  <text x="210.0" y="130" text-anchor="middle" fill="#8a8fa8" font-size="12">Surgery</text>
  <line x1="170.0" y1="190" x2="250.0" y2="230" stroke="#4FC3F7" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="250.0" cy="230" rx="12" ry="6" fill="none" stroke="#4FC3F7" stroke-width="2" transform="rotate(25, 250.0, 230)"/>
  <text x="210.0" y="275" text-anchor="middle" fill="#8a8fa8" font-size="11">Works only if tumor is local</text>
  <rect x="440" y="80" width="300" height="210" fill="#111738" rx="10" stroke="#FF9800" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="590.0" y="110" text-anchor="middle" fill="#FF9800" font-size="16" font-weight="600">The Hot Ray</text>
  <text x="590.0" y="130" text-anchor="middle" fill="#8a8fa8" font-size="12">Radiation</text>
  <line x1="590.0" y1="210" x2="615.0" y2="253.3" stroke="#FF9800" stroke-width="2" opacity="0.6"/>
  <line x1="590.0" y1="210" x2="628.3" y2="242.1" stroke="#FF9800" stroke-width="2" opacity="0.6"/>
  <line x1="590.0" y1="210" x2="637.0" y2="227.1" stroke="#FF9800" stroke-width="2" opacity="0.6"/>
  <line x1="590.0" y1="210" x2="640.0" y2="210.0" stroke="#FF9800" stroke-width="2" opacity="0.6"/>
  <line x1="590.0" y1="210" x2="637.0" y2="192.9" stroke="#FF9800" stroke-width="2" opacity="0.6"/>
  <line x1="590.0" y1="210" x2="628.3" y2="177.9" stroke="#FF9800" stroke-width="2" opacity="0.6"/>
  <line x1="590.0" y1="210" x2="615.0" y2="166.7" stroke="#FF9800" stroke-width="2" opacity="0.6"/>
  <circle cx="590.0" cy="210" r="8" fill="#FF9800" opacity="0.7"/>
  <text x="590.0" y="275" text-anchor="middle" fill="#8a8fa8" font-size="11">Works only near the surface</text>
  <text x="400.0" y="200" text-anchor="middle" fill="#8a8fa8" font-size="40" opacity="0.3">?</text>
  <rect x="100" y="305" width="600" height="35" fill="#111738" rx="6" stroke="#FF6B6B" stroke-width="1" stroke-opacity="0.4"/>
  <text x="400.0" y="327" text-anchor="middle" fill="#FF6B6B" font-size="13" font-weight="600">If the cancer had spread? Nothing. No drugs. No chemicals. No options.</text>
</svg>
