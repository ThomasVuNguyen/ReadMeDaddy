<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1e3a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#bg2)" rx="12"/>

  <text x="400" y="35" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">WHERE WE STAND</text>
  <text x="400" y="55" text-anchor="middle" fill="#ffffff60" font-size="13">Not at the center of anything</text>
  <circle cx="400" cy="210" r="240" fill="#FF6B6B" fill-opacity="0.06" stroke="#FF6B6B" stroke-width="1" stroke-opacity="0.25"/>
  <circle cx="400" cy="210" r="170" fill="#FFD700" fill-opacity="0.06" stroke="#FFD700" stroke-width="1" stroke-opacity="0.25"/>
  <circle cx="400" cy="210" r="110" fill="#69F0AE" fill-opacity="0.06" stroke="#69F0AE" stroke-width="1" stroke-opacity="0.25"/>
  <circle cx="400" cy="210" r="60" fill="#4FC3F7" fill-opacity="0.06" stroke="#4FC3F7" stroke-width="1" stroke-opacity="0.25"/>
  <circle cx="400" cy="210" r="20" fill="#B388FF" fill-opacity="0.06" stroke="#B388FF" stroke-width="1" stroke-opacity="0.25"/>
  <text x="435" y="185" fill="#B388FF" font-size="11" font-weight="bold">You</text>
  <text x="435" y="199" fill="#ffffff30" font-size="9">100 billion neurons</text>
  <line x1="420" y1="210" x2="430" y2="180" stroke="#B388FF" stroke-width="0.5" opacity="0.3"/>
  <text x="475" y="210" fill="#4FC3F7" font-size="11" font-weight="bold">Earth</text>
  <text x="475" y="224" fill="#ffffff30" font-size="9">8 billion humans</text>
  <line x1="460" y1="210" x2="470" y2="205" stroke="#4FC3F7" stroke-width="0.5" opacity="0.3"/>
  <text x="525" y="110" fill="#69F0AE" font-size="11" font-weight="bold">Solar System</text>
  <text x="525" y="124" fill="#ffffff30" font-size="9">1 ordinary star</text>
  <line x1="510" y1="210" x2="520" y2="105" stroke="#69F0AE" stroke-width="0.5" opacity="0.3"/>
  <text x="585" y="50" fill="#FFD700" font-size="11" font-weight="bold">Milky Way</text>
  <text x="585" y="64" fill="#ffffff30" font-size="9">200 billion stars</text>
  <line x1="570" y1="210" x2="580" y2="45" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
  <text x="655" y="-20" fill="#FF6B6B" font-size="11" font-weight="bold">Observable Universe</text>
  <text x="655" y="-6" fill="#ffffff30" font-size="9">200 billion galaxies</text>
  <line x1="640" y1="210" x2="650" y2="-25" stroke="#FF6B6B" stroke-width="0.5" opacity="0.3"/>
  <circle cx="400" cy="210" r="3" fill="#B388FF"/>

  <text x="400" y="370" text-anchor="middle" fill="#ffffff40" font-size="12">We're not homeless. We're home. This strange world is the only one we've got.</text>

</svg>