<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1e3a"/>
    </linearGradient>
  </defs>
  <rect width="700" height="420" fill="url(#bg4)" rx="12"/>

  <text x="350" y="35" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">WHAT THE UNIVERSE IS MADE OF</text>
  <text x="350" y="55" text-anchor="middle" fill="#ffffff60" font-size="13">We only understand 5% of it</text>
  <path d="M 280 230 L 280.0 90.0 A 140 140 0 1 1 146.9 273.3 Z" fill="#B388FF" opacity="0.25" stroke="#B388FF" stroke-width="2"/>
  <text x="413" y="327" text-anchor="middle" fill="#B388FF" font-size="13" font-weight="bold">~70%</text>
  <path d="M 280 230 L 146.9 273.3 A 140 140 0 0 1 236.7 96.9 Z" fill="#FF6B6B" opacity="0.25" stroke="#FF6B6B" stroke-width="2"/>
  <text x="133" y="155" text-anchor="middle" fill="#FF6B6B" font-size="13" font-weight="bold">~25%</text>
  <path d="M 280 230 L 236.7 96.9 A 140 140 0 0 1 280.0 90.0 Z" fill="#FFD700" opacity="0.25" stroke="#FFD700" stroke-width="2"/>
  <text x="254" y="67" text-anchor="middle" fill="#FFD700" font-size="13" font-weight="bold">~5%</text>
  <rect x="470" y="110" width="16" height="16" fill="#B388FF" opacity="0.5" rx="3"/>
  <text x="495" y="123" fill="#B388FF" font-size="13" font-weight="bold">Dark Energy (~70%)</text>
  <text x="495" y="140" fill="#ffffff50" font-size="11">Mysterious force accelerating</text>
  <text x="495" y="155" fill="#ffffff50" font-size="11">the expansion of space.</text>
  <text x="495" y="170" fill="#ffffff50" font-size="11">We have no idea what it is.</text>
  <rect x="470" y="200" width="16" height="16" fill="#FF6B6B" opacity="0.5" rx="3"/>
  <text x="495" y="213" fill="#FF6B6B" font-size="13" font-weight="bold">Dark Matter (~25%)</text>
  <text x="495" y="230" fill="#ffffff50" font-size="11">Invisible, detectable only</text>
  <text x="495" y="245" fill="#ffffff50" font-size="11">through its gravity.</text>
  <text x="495" y="260" fill="#ffffff50" font-size="11">Unknown composition.</text>
  <rect x="470" y="290" width="16" height="16" fill="#FFD700" opacity="0.5" rx="3"/>
  <text x="495" y="303" fill="#FFD700" font-size="13" font-weight="bold">Normal Matter (~5%)</text>
  <text x="495" y="320" fill="#ffffff50" font-size="11">Stars, planets, gas, us.</text>
  <text x="495" y="335" fill="#ffffff50" font-size="11">Everything we can see</text>
  <text x="495" y="350" fill="#ffffff50" font-size="11">and touch.</text>

  <!-- Punchline -->
  <text x="350" y="405" text-anchor="middle" fill="#ffffff40" font-size="12">95% of the universe is stuff we can't see, can't touch, and can't explain.</text>

</svg>