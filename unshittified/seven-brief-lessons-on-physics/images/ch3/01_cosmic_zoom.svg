<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1e3a"/>
    </linearGradient>
  </defs>
  <rect width="900" height="400" fill="url(#bg)" rx="12"/>

  <text x="450" y="35" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">HOW OUR VIEW KEPT EXPANDING</text>
  <text x="450" y="55" text-anchor="middle" fill="#ffffff60" font-size="13">Each revolution made us smaller</text>

  <!-- Timeline line -->
  <line x1="60" y1="200" x2="840" y2="200" stroke="#ffffff20" stroke-width="2"/>
  <circle cx="100" cy="200" r="25" fill="#FF6B6B10" stroke="#FF6B6B" stroke-width="1.5" opacity="0.7"/>
  <circle cx="100" cy="200" r="5" fill="#FF6B6B"/>
  <text x="100" y="155" text-anchor="middle" fill="#FF6B6B" font-size="14" font-weight="bold">Ancient</text>
  <text x="100" y="169" text-anchor="middle" fill="#ffffff50" font-size="10">~3000 BC</text>
  <text x="100" y="245" text-anchor="middle" fill="#ffffff60" font-size="11">Flat Earth,</text>
  <text x="100" y="261" text-anchor="middle" fill="#ffffff60" font-size="11">sky above</text>
  <circle cx="260" cy="200" r="35" fill="#FFD70010" stroke="#FFD700" stroke-width="1.5" opacity="0.7"/>
  <circle cx="260" cy="200" r="5" fill="#FFD700"/>
  <text x="260" y="145" text-anchor="middle" fill="#FFD700" font-size="14" font-weight="bold">Anaximander</text>
  <text x="260" y="159" text-anchor="middle" fill="#ffffff50" font-size="10">~600 BC</text>
  <text x="260" y="255" text-anchor="middle" fill="#ffffff60" font-size="11">Earth floats</text>
  <text x="260" y="271" text-anchor="middle" fill="#ffffff60" font-size="11">in space</text>
  <circle cx="420" cy="200" r="50" fill="#4FC3F710" stroke="#4FC3F7" stroke-width="1.5" opacity="0.7"/>
  <circle cx="420" cy="200" r="5" fill="#4FC3F7"/>
  <text x="420" y="130" text-anchor="middle" fill="#4FC3F7" font-size="14" font-weight="bold">Copernicus</text>
  <text x="420" y="144" text-anchor="middle" fill="#ffffff50" font-size="10">1543</text>
  <text x="420" y="270" text-anchor="middle" fill="#ffffff60" font-size="11">Sun at center,</text>
  <text x="420" y="286" text-anchor="middle" fill="#ffffff60" font-size="11">Earth orbits</text>
  <circle cx="580" cy="200" r="70" fill="#B388FF10" stroke="#B388FF" stroke-width="1.5" opacity="0.7"/>
  <circle cx="580" cy="200" r="5" fill="#B388FF"/>
  <text x="580" y="110" text-anchor="middle" fill="#B388FF" font-size="14" font-weight="bold">Milky Way</text>
  <text x="580" y="124" text-anchor="middle" fill="#ffffff50" font-size="10">1920s</text>
  <text x="580" y="290" text-anchor="middle" fill="#ffffff60" font-size="11">Sun is one of</text>
  <text x="580" y="306" text-anchor="middle" fill="#ffffff60" font-size="11">billions of stars</text>
  <circle cx="740" cy="200" r="95" fill="#69F0AE10" stroke="#69F0AE" stroke-width="1.5" opacity="0.7"/>
  <circle cx="740" cy="200" r="5" fill="#69F0AE"/>
  <text x="740" y="85" text-anchor="middle" fill="#69F0AE" font-size="14" font-weight="bold">Modern</text>
  <text x="740" y="99" text-anchor="middle" fill="#ffffff50" font-size="10">1990s+</text>
  <text x="740" y="315" text-anchor="middle" fill="#ffffff60" font-size="11">Billions of</text>
  <text x="740" y="331" text-anchor="middle" fill="#ffffff60" font-size="11">galaxies, expanding</text>
  <line x1="133" y1="200" x2="217" y2="200" stroke="#ffffff30" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="303" y1="200" x2="362" y2="200" stroke="#ffffff30" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="478" y1="200" x2="502" y2="200" stroke="#ffffff30" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="658" y1="200" x2="637" y2="200" stroke="#ffffff30" stroke-width="1.5" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ffffff30"/>
    </marker>
  </defs>

  <!-- Bottom: the punchline -->
  <text x="450" y="380" text-anchor="middle" fill="#ffffff40" font-size="12">Each step: what we thought was everything turned out to be a speck inside something bigger.</text>

</svg>