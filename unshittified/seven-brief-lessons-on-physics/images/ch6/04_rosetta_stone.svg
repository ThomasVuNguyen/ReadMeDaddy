<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1e3a"/>
    </linearGradient>
  </defs>
  <rect width="700" height="450" fill="url(#bg4)" rx="12"/>

  <text x="350" y="35" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">THE ROSETTA STONE OF PHYSICS</text>
  <text x="350" y="55" text-anchor="middle" fill="#ffffff60" font-size="13">Hawking radiation: where all three pillars meet</text>
  <circle cx="350" cy="160" r="120" fill="#B388FF" fill-opacity="0.08" stroke="#B388FF" stroke-width="2" stroke-opacity="0.3"/>
  <text x="350" y="130" text-anchor="middle" fill="#B388FF" font-size="14" font-weight="bold">QUANTUM</text>
  <text x="350" y="148" text-anchor="middle" fill="#B388FF" font-size="14" font-weight="bold">MECHANICS</text>
  <text x="350" y="170" text-anchor="middle" fill="#B388FF80" font-size="10">The radiation is</text>
  <text x="350" y="185" text-anchor="middle" fill="#B388FF80" font-size="10">a quantum effect</text>
  <circle cx="280.4" cy="280.0" r="120" fill="#69F0AE" fill-opacity="0.08" stroke="#69F0AE" stroke-width="2" stroke-opacity="0.3"/>
  <text x="280.4" y="250.0" text-anchor="middle" fill="#69F0AE" font-size="14" font-weight="bold">GENERAL</text>
  <text x="280.4" y="268.0" text-anchor="middle" fill="#69F0AE" font-size="14" font-weight="bold">RELATIVITY</text>
  <text x="280.4" y="290.0" text-anchor="middle" fill="#69F0AE80" font-size="10">The black hole is</text>
  <text x="280.4" y="305.0" text-anchor="middle" fill="#69F0AE80" font-size="10">a spacetime object</text>
  <circle cx="419.6" cy="280.0" r="120" fill="#FF6B6B" fill-opacity="0.08" stroke="#FF6B6B" stroke-width="2" stroke-opacity="0.3"/>
  <text x="419.6" y="250.0" text-anchor="middle" fill="#FF6B6B" font-size="14" font-weight="bold">THERMO-</text>
  <text x="419.6" y="268.0" text-anchor="middle" fill="#FF6B6B" font-size="14" font-weight="bold">DYNAMICS</text>
  <text x="419.6" y="290.0" text-anchor="middle" fill="#FF6B6B80" font-size="10">It produces</text>
  <text x="419.6" y="305.0" text-anchor="middle" fill="#FF6B6B80" font-size="10">heat</text>
  <circle cx="350" cy="240" r="30" fill="#FFD700" opacity="0.1"/>
  <text x="350" y="235" text-anchor="middle" fill="#FFD700" font-size="11" font-weight="bold">HAWKING</text>
  <text x="350" y="250" text-anchor="middle" fill="#FFD700" font-size="11" font-weight="bold">RADIATION</text>

  <!-- Punchline -->
  <text x="350" y="420" text-anchor="middle" fill="#ffffff50" font-size="12">Whoever cracks this puzzle will understand the true nature of time, space, and reality.</text>
  <text x="350" y="438" text-anchor="middle" fill="#ffffff35" font-size="11">The clue is sitting right here. Nobody's solved it yet.</text>

