<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1e3a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#bg3)" rx="12"/>

  <text x="400" y="35" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">WHERE DOES TIME'S ARROW COME FROM?</text>
  <text x="400" y="55" text-anchor="middle" fill="#ffffff60" font-size="13">The fundamental equations don't care which direction time runs</text>
  <rect x="50" y="75" width="700" height="110" fill="#69F0AE08" rx="8" stroke="#69F0AE20" stroke-width="1"/>
  <text x="70" y="100" fill="#69F0AE" font-size="14" font-weight="bold">TIME-REVERSIBLE (no heat involved)</text>
  <text x="110" y="130" text-anchor="middle" fill="#ffffff40" font-size="10">Forward</text>
  <circle cx="80" cy="140" r="6" fill="#69F0AE" opacity="0.5"/>
  <circle cx="120" cy="150" r="6" fill="#69F0AE" opacity="0.5"/>
  <circle cx="160" cy="160" r="6" fill="#69F0AE" opacity="0.5"/>
  <circle cx="200" cy="150" r="6" fill="#69F0AE" opacity="0.5"/>
  <circle cx="240" cy="140" r="6" fill="#69F0AE" opacity="0.5"/>
  <line x1="80" y1="175" x2="250" y2="175" stroke="#ffffff15" stroke-width="1"/>
  <text x="310" y="155" text-anchor="middle" fill="#69F0AE" font-size="20">=</text>
  <text x="410" y="130" text-anchor="middle" fill="#ffffff40" font-size="10">Backward</text>
  <circle cx="380" cy="140" r="6" fill="#69F0AE" opacity="0.5"/>
  <circle cx="420" cy="150" r="6" fill="#69F0AE" opacity="0.5"/>
  <circle cx="460" cy="160" r="6" fill="#69F0AE" opacity="0.5"/>
  <circle cx="500" cy="150" r="6" fill="#69F0AE" opacity="0.5"/>
  <circle cx="540" cy="140" r="6" fill="#69F0AE" opacity="0.5"/>
  <line x1="380" y1="175" x2="550" y2="175" stroke="#ffffff15" stroke-width="1"/>
  <text x="680" y="155" fill="#69F0AE80" font-size="11">Looks identical</text>
  <text x="680" y="172" fill="#69F0AE80" font-size="11">either way</text>
  <rect x="50" y="200" width="700" height="110" fill="#FF6B6B08" rx="8" stroke="#FF6B6B20" stroke-width="1"/>
  <text x="70" y="225" fill="#FF6B6B" font-size="14" font-weight="bold">IRREVERSIBLE (heat involved)</text>
  <text x="120" y="255" text-anchor="middle" fill="#ffffff40" font-size="10">Forward</text>
  <ellipse cx="90" cy="280" rx="12" ry="16" fill="#FFD700" opacity="0.4"/>
  <text x="140" y="285" fill="#ffffff30" font-size="16">→</text>
  <circle cx="170" cy="275" r="4" fill="#FFD700" opacity="0.3"/>
  <circle cx="190" cy="280" r="4" fill="#FFD700" opacity="0.3"/>
  <circle cx="185" cy="270" r="4" fill="#FFD700" opacity="0.3"/>
  <circle cx="175" cy="285" r="4" fill="#FFD700" opacity="0.3"/>
  <circle cx="195" cy="275" r="4" fill="#FFD700" opacity="0.3"/>
  <text x="310" y="285" text-anchor="middle" fill="#FF6B6B" font-size="20">≠</text>
  <text x="420" y="255" text-anchor="middle" fill="#ffffff40" font-size="10">Backward</text>
  <circle cx="390" cy="275" r="4" fill="#FFD700" opacity="0.3"/>
  <circle cx="410" cy="280" r="4" fill="#FFD700" opacity="0.3"/>
  <circle cx="405" cy="270" r="4" fill="#FFD700" opacity="0.3"/>
  <circle cx="395" cy="285" r="4" fill="#FFD700" opacity="0.3"/>
  <circle cx="415" cy="275" r="4" fill="#FFD700" opacity="0.3"/>
  <text x="450" y="285" fill="#ffffff30" font-size="16">→</text>
  <ellipse cx="490" cy="280" rx="12" ry="16" fill="#FFD700" opacity="0.4"/>
  <text x="505" y="285" fill="#FF6B6B" font-size="14">?!</text>
  <text x="680" y="275" fill="#FF6B6B80" font-size="11">This NEVER</text>
  <text x="680" y="292" fill="#FF6B6B80" font-size="11">happens</text>
  <rect x="50" y="325" width="700" height="40" fill="#ffffff06" rx="6"/>
  <text x="400" y="350" text-anchor="middle" fill="#B388FF" font-size="13">The arrow of time = the direction entropy increases = the direction heat flows.</text>

</svg>